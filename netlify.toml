# NETLIFY CONFIGURATION - PRILABSA WEBSITE 2025
# Security headers, redirects, and build configuration

[build]
  publish = "dist"
  command = "npm run deploy"
  
# Build optimization flags
[build.environment]
  NODE_VERSION = "18"
  GENERATE_SOURCEMAP = "false"
  CI = "true"

# Security Headers Implementation
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy (CSP) - Previene XSS y otras injecciones
    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: https: blob:;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self' https://www.google-analytics.com /.netlify/functions/;
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      manifest-src 'self';
      worker-src 'self';
      upgrade-insecure-requests;
    '''
    
    # HSTS - Fuerza HTTPS y previene downgrade attacks
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Previene MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Previene clickjacking
    X-Frame-Options = "DENY"
    
    # XSS Protection (legacy pero recomendado)
    X-XSS-Protection = "1; mode=block"
    
    # Controla información de referrer
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permissions Policy - Controla APIs del navegador
    Permissions-Policy = '''
      camera=(),
      microphone=(),
      geolocation=(),
      interest-cohort=(),
      payment=(),
      usb=(),
      vibrate=(),
      fullscreen=(self)
    '''
    
    # Cache control para HTML
    Cache-Control = "no-cache, no-store, must-revalidate"

# Headers específicos para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    # Cache largo para assets con hash
    Cache-Control = "public, max-age=31536000, immutable"
    
    # Security headers para assets
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Headers para imágenes
[[headers]]
  for = "*.{png,jpg,jpeg,gif,svg,webp,avif}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

# Headers para fuentes
[[headers]]
  for = "*.{woff,woff2,ttf,otf,eot}"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Headers para funciones Netlify
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Content-Type = "application/json"

# Redirects para SEO y UX
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Error page handling
[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 404

# SPA fallback - DEBE IR AL FINAL para no interceptar funciones Netlify
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run deploy"

[context.deploy-preview]
  command = "npm run deploy"

[context.branch-deploy]
  command = "npm run deploy"
